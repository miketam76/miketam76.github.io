name: Deploy Forest Theme to GitHub Pages

on:
  push:
    branches:
      - main  # Triggers only on successful pushes to the main branch

permissions:
  contents: write  # Necessary for the gh-pages action to push the build to your repo

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # You can adjust this to match your local version
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci  # 'npm ci' is faster and more reliable in CI environments than 'npm install'

      - name: Build Production
        run: npx ng build --configuration production --base-href "/"

      - name: Deploy to GitHub Pages
        run: npx angular-cli-ghpages --dir=dist/miketam76.github.io/browser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Automatically provided by GitHub