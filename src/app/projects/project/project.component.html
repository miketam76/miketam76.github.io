<div class="card">
    <h3 class="project-title">{{ project.title }}</h3>
    <div class="project-meta">
        <span class="project-date">📅 Last Updated: {{ project.date }}</span>
        <span class="project-reading-time">⏱️ {{ project.details | readingTime }}</span>
    </div>
    <div class="project-description" [innerHTML]="getSafeHtml()"></div>
</div>
